{% extends "base.html" %}
{% block title %}Register — InterviewIQ{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="card">
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-sub">Start your free interview preparation</p>

      <form method="POST">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="John Doe" required/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="john@example.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" name="password" id="pw1" placeholder="Min 6 characters" required/>
            <button type="button" class="pw-eye" onclick="togglePw('pw1')">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="pw-wrap">
            <input type="password" name="confirm_password" id="pw2" placeholder="Repeat password" required/>
            <button type="button" class="pw-eye" onclick="togglePw('pw2')">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">Register</button>
      </form>

      <p class="auth-footer-link">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
  </div>
</div>
<script>
function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
