<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}InterviewIQ{% endblock %}</title>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a class="nav-logo" href="{{ url_for('index') }}">Interview<span>IQ</span></a>
    <div class="nav-links">
      {% if current_user.is_authenticated %}
        <a href="{{ url_for('dashboard') }}" {% if request.endpoint=='dashboard' %}class="active"{% endif %}>Dashboard</a>
        <a href="{{ url_for('prepare') }}"   {% if request.endpoint=='prepare'   %}class="active"{% endif %}>Prepare</a>
        <a href="{{ url_for('history') }}"   {% if request.endpoint=='history'   %}class="active"{% endif %}>History</a>
        <a href="{{ url_for('logout') }}" class="btn btn-outline btn-sm">Logout</a>
      {% else %}
        <a href="{{ url_for('login') }}">Login</a>
        <a href="{{ url_for('register') }}" class="btn btn-primary btn-sm">Get Started</a>
      {% endif %}
    </div>
  </div>
</nav>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, msg in messages %}
    <div class="flash-box flash-{{ category }}">{{ msg }}</div>
  {% endfor %}
{% endwith %}

{% block content %}{% endblock %}

</body>
</html>
