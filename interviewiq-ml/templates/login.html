{% extends "base.html" %}
{% block title %}Login — InterviewIQ{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="card">
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-sub">Login to continue preparing</p>

      <form method="POST">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="john@example.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" name="password" id="pw" placeholder="Your password" required/>
            <button type="button" class="pw-eye" onclick="togglePw('pw')">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">Login</button>
      </form>

      <p class="auth-footer-link">No account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>
  </div>
</div>
<script>
function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
